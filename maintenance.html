<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Under maintenance Mick's World Cup 2026</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="soccerball.png" type="image/png">

  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .maint-wrap {
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }
    .maint-ball {
      display: block;
      margin: 0 auto 20px;
      animation: spin 6s linear infinite;
    }
    .maint-wrap h2 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .maint-wrap p {
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink-2);
      margin: 0 auto;
      max-width: 420px;
    }
    .maint-wrap p + p { margin-top: 12px; }
  </style>
</head>
<body>

<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-hero-eyebrow">Under maintenance</div>
    <h1>We'll be <span>back shortly</span></h1>
    <p class="page-hero-sub">The site is down for a quick update.</p>
  </div>
  <div class="page-hero-rainbow"></div>
</div>

<div class="main">
  <div class="maint-wrap">
    <img class="maint-ball" src="soccerball.png" width="48" height="48" alt="" />
    <h2>Just a moment</h2>
    <p>We're making a few changes behind the scenes so grab a tea or coffee.</p>
    <p>Check back in a little while.</p>
  </div>
</div>

</body>
</html>
